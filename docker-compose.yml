services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: makeupseven
      POSTGRES_USER: makeupseven
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-makeupseven_dev}
    # No ports published — DB reachable only on the internal Docker network.
    # For local SQL clients: docker compose exec postgres psql -U makeupseven -d makeupseven
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U makeupseven"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-java:
    build: ./backend-java
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/makeupseven
      SPRING_DATASOURCE_USERNAME: makeupseven
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-makeupseven_dev}
      JWT_SECRET: ${JWT_SECRET:-makeupseven-jwt-secret-change-in-production-min-256-bits}
      REQUIRE_SECURE_JWT: ${REQUIRE_SECURE_JWT:-false}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_UPLOAD_PRESET: ${CLOUDINARY_UPLOAD_PRESET:-}
      PYTHON_SERVICE_URL: http://backend-python:8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MARKETPLACE_MODE: ${MARKETPLACE_MODE:-false}
      COMMISSION_RATE: ${COMMISSION_RATE:-0}
      FREE_TIER_BOOKINGS: ${FREE_TIER_BOOKINGS:-9999}
      DEFAULT_MUA_TIER: ${DEFAULT_MUA_TIER:-PRO}
      SINGLE_ARTIST_MODE: ${SINGLE_ARTIST_MODE:-true}
      OWNER_EMAIL: ${OWNER_EMAIL:-priya@priyaprachi.com}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  backend-python:
    build: ./backend-python
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://makeupseven:${POSTGRES_PASSWORD:-makeupseven_dev}@postgres:5432/makeupseven
      JAVA_API_URL: http://backend-java:8080
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-makeupseven_webhook_verify}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@makeupseven.com}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend-java
      - backend-python
    profiles:
      - gateway

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend-java
      - backend-python
    profiles:
      - production

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_SEARCH_URL: ${NEXT_PUBLIC_SEARCH_URL:-http://localhost:8000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_SEARCH_URL: ${NEXT_PUBLIC_SEARCH_URL:-http://localhost:8000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      INTERNAL_API_URL: http://backend-java:8080
    depends_on:
      - backend-java
      - backend-python

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
