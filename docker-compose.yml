services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: makeupseven
      POSTGRES_USER: makeupseven
      POSTGRES_PASSWORD: makeupseven_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U makeupseven"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-java:
    build: ./backend-java
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/makeupseven
      SPRING_DATASOURCE_USERNAME: makeupseven
      SPRING_DATASOURCE_PASSWORD: makeupseven_dev
      JWT_SECRET: ${JWT_SECRET:-makeupseven-jwt-secret-change-in-production-min-256-bits}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      PYTHON_SERVICE_URL: http://backend-python:8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  backend-python:
    build: ./backend-python
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://makeupseven:makeupseven_dev@postgres:5432/makeupseven
      JAVA_API_URL: http://backend-java:8080
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-makeupseven_webhook_verify}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend-java
      - backend-python
    profiles:
      - gateway

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_SEARCH_URL: ${NEXT_PUBLIC_SEARCH_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_SEARCH_URL: ${NEXT_PUBLIC_SEARCH_URL:-http://localhost:8000}
    depends_on:
      - backend-java
      - backend-python

volumes:
  postgres_data:
