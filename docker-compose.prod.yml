# Production overlay — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile production up -d
#
# Hides direct API/frontend ports; only Caddy serves 80/443 with automatic HTTPS.

services:
  backend-java:
    ports: !reset []

  backend-python:
    ports: !reset []

  frontend:
    ports: !reset []

  gateway:
    profiles:
      - disabled
